baseURL: https://olivierlespagnon.com/
locale: fr-fr
title: "Olivier Lespagnon"

# Thème chargé via Hugo Modules (remplace le git submodule)
module:
  imports:
    - path: github.com/hugo-toha/toha/v4
  mounts:
    - source: static/files
      target: static/files
    - source: ./node_modules/flag-icons/flags
      target: static/flags
    - source: ./node_modules/@fontsource/mulish/files
      target: static/files
    - source: ./node_modules/katex/dist/fonts
      target: static/fonts

languages:
  fr:
    locale: fr
    label: Français
    title: "Olivier Lespagnon"
    weight: 1
  en:
    locale: en
    label: English
    title: "Olivier Lespagnon"
    weight: 2
defaultContentLanguage: fr

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

enableEmoji: true

params:
  background: /images/site/bg.jpg
  logo:
    favicon: images/olivier.jpeg
  gitRepo: https://github.com/Olesp/olesp.github.io
  gitBranch: source
  topNavbar:
    maxVisibleSections: 5
  features:
    theme:
      enable: true
      services:
        light: true
        dark: true
        default: system
    portfolio:
      enable: true
    blog:
      enable: true
      showAuthor: true
    toc:
      enable: true
    tags:
      enable: true
      on_card: true
    flags:
      enable: true
    readingTime:
      enable: true
    copyCodeButton:
      enable: true
    embedpdf:
      enable: true
    syntaxHighlight:
      enable: true
      services:
        hljs:
          noHighlightRe: /^no-highlight$/i
    math:
      enable: true
      services:
        katex:
          delimiters:
            - left: $$
              right: $$
              display: true
            - left: \\[
              right: \\]
              display: true
            - left: $
              right: $
              display: false
            - left: \\(
              right: \\)
              display: false
    comment:
      enable: false
    analytics:
      enable: false
    support:
      enable: false
  footer:
    enable: true
    template: footer.html
    navigation:
      enable: true
    contactMe:
      enable: true
    credentials:
      enable: true
    newsletter:
      enable: false
    disclaimer:
      enable: false
